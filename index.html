<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vertellis 🃏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.12);
      --radius: 24px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: pan-y;
    }

    /* ── DECK SELECT SCREEN ── */
    #deck-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 32px;
      gap: 16px;
    }

    .deck-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .deck-header h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .deck-header p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 6px;
    }

    .deck-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
      align-content: start;
    }

    .deck-card {
      border-radius: 20px;
      padding: 20px 16px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 120px;
      border: none;
      text-align: left;
      color: white;
    }

    .deck-card:active { transform: scale(0.96); opacity: 0.85; }

    .deck-emoji { font-size: 32px; }
    .deck-name { font-size: 16px; font-weight: 700; }
    .deck-count { font-size: 12px; opacity: 0.75; }

    .deck-familie { background: linear-gradient(135deg, #f97316, #ea580c); }
    .deck-paare   { background: linear-gradient(135deg, #ec4899, #be185d); }
    .deck-freunde { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .deck-teens   { background: linear-gradient(135deg, #a855f7, #7c3aed); }
    .deck-party   { background: linear-gradient(135deg, #22c55e, #15803d); }
    .deck-tief    { background: linear-gradient(135deg, #f59e0b, #b45309); }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-back:active { opacity: 0.7; }

    .game-deck-name {
      font-size: 15px;
      font-weight: 600;
      opacity: 0.9;
    }

    .btn-shuffle {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .btn-shuffle:active { opacity: 0.7; }

    /* Card area */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      perspective: 1200px;
      position: relative;
    }

    .card-wrapper {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 3/4;
      max-height: 65vh;
      position: relative;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
    }

    .card-front {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
    }

    .card-front .card-content {
      text-align: center;
    }

    .card-number {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 600;
      opacity: 0.4;
      letter-spacing: 1px;
    }

    .card-emoji {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .card-question {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: -0.3px;
    }

    .card-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.35;
      white-space: nowrap;
    }

    .card-back {
      transform: rotateY(180deg);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      flex-direction: column;
      gap: 16px;
      text-align: center;
    }

    .card-back-title {
      font-size: 14px;
      font-weight: 600;
      opacity: 0.5;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-back-prompt {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.4;
      opacity: 0.85;
    }

    /* Navigation */
    .card-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 16px 20px 32px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn:disabled:active { transform: none; }

    .nav-btn.next {
      width: 72px;
      height: 72px;
      font-size: 26px;
    }

    /* Progress bar */
    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.1);
      margin: 0 20px;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 2px;
      transition: width 0.3s ease;
      opacity: 0.5;
    }

    /* Slide animation */
    @keyframes slideInRight {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .card-wrapper.slide-right .card-inner { animation: slideInRight 0.3s ease; }
    .card-wrapper.slide-left .card-inner { animation: slideInLeft 0.3s ease; }

    /* Background gradient per deck */
    .bg-familie { background: radial-gradient(ellipse at top, #7c2d0820 0%, transparent 70%); }
    .bg-paare   { background: radial-gradient(ellipse at top, #9d174d20 0%, transparent 70%); }
    .bg-freunde { background: radial-gradient(ellipse at top, #1e3a8a20 0%, transparent 70%); }
    .bg-teens   { background: radial-gradient(ellipse at top, #4c1d9520 0%, transparent 70%); }
    .bg-party   { background: radial-gradient(ellipse at top, #14532d20 0%, transparent 70%); }
    .bg-tief    { background: radial-gradient(ellipse at top, #78350f20 0%, transparent 70%); }

    .deck-accent-familie { color: #fb923c; }
    .deck-accent-paare   { color: #f472b6; }
    .deck-accent-freunde { color: #60a5fa; }
    .deck-accent-teens   { color: #c084fc; }
    .deck-accent-party   { color: #4ade80; }
    .deck-accent-tief    { color: #fbbf24; }
  </style>
</head>
<body>

<!-- DECK SELECTION -->
<div id="deck-screen">
  <div class="deck-header">
    <h1>🃏 Vertellis</h1>
    <p>Wähle ein Deck und komm ins Gespräch</p>
  </div>
  <div class="deck-grid" id="deck-grid"></div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="game-header">
    <button class="btn-back" onclick="backToDecks()">← Decks</button>
    <span class="game-deck-name" id="game-deck-name"></span>
    <button class="btn-shuffle" onclick="shuffleCards()" title="Mischen">🔀</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="card-area">
    <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front">
          <span class="card-number" id="card-number"></span>
          <div class="card-content">
            <span class="card-emoji" id="card-emoji"></span>
            <p class="card-question" id="card-question"></p>
          </div>
          <span class="card-hint">Tippen zum Umdrehen</span>
        </div>
        <div class="card-face card-back">
          <p class="card-back-title">Moment der Stille</p>
          <p class="card-back-prompt" id="card-back-prompt"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="card-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevCard()">←</button>
    <button class="nav-btn next" id="btn-next" onclick="nextCard()">→</button>
  </div>
</div>

      { q: 'Was ist die eine Frage, die du dir nie ehrlich beantwortet hast?', e: '❓' },
      { q: 'In welchem Bereich bist du dich selbst gegenüber unehrlich?', e: '🪞' },
      { q: 'Was wäre, wenn du wirklich nichts zu verlieren hättest?', e: '🔥' },
      { q: 'Welche Wunde in dir ist noch nicht geheilt?', e: '💔' },
      { q: 'Was bedeutet Freiheit für dich — wirklich?', e: '🦅' },
      { q: 'Wem schuldest du eine Entschuldigung, die du noch nicht gegeben hast?', e: '🕊️' },
      { q: 'Was hältst du für wahr, das die meisten nicht glauben?', e: '🔭' },
      { q: 'Was wäre die mutigste Version von dir?', e: '🦁' },
      { q: 'Was gibst du auf, um dazuzugehören?', e: '🎭' },
      { q: 'Wann hast du zuletzt jemandem wirklich vertraut?', e: '🤝' },
      { q: 'Was ist das Erste, wofür du dich am Ende deines Lebens entschuldigen würdest?', e: '⌛' },
      { q: 'Was liebst du an dir — ohne Einschränkung?', e: '💛' },
      { q: 'Wenn dein Leben ein Kapitel endet und ein neues beginnt — was muss anders werden?', e: '📖' },
    ]
  }
];

let currentDeck = null;
let currentCards = [];
let currentIndex = 0;
let isFlipped = false;

// Touch handling
let touchStartX = 0;
let touchStartY = 0;

function init() {
  const grid = document.getElementById('deck-grid');
  DECKS.forEach(deck => {
    const btn = document.createElement('button');
    btn.className = `deck-card ${deck.color}`;
    btn.innerHTML = `
      <span class="deck-emoji">${deck.emoji}</span>
      <span class="deck-name">${deck.name}</span>
      <span class="deck-count">${deck.questions.length} Karten</span>
    `;
    btn.onclick = () => startDeck(deck);
    grid.appendChild(btn);
  });
}

function startDeck(deck) {
  currentDeck = deck;
  currentCards = [...deck.questions];
  currentIndex = 0;
  isFlipped = false;

  document.getElementById('deck-screen').style.display = 'none';
  const gameScreen = document.getElementById('game-screen');
  gameScreen.style.display = 'flex';
  gameScreen.className = deck.bg;
  Object.assign(gameScreen.style, { flex: '1', flexDirection: 'column', height: '100vh' });

  document.getElementById('game-deck-name').innerHTML = `<span class="${deck.accent}">${deck.emoji} ${deck.name}</span>`;

  setupTouchHandlers();
  renderCard('right');
}

function renderCard(direction) {
  const wrapper = document.getElementById('card-wrapper');
  const inner = document.getElementById('card-inner');

  isFlipped = false;
  inner.classList.remove('flipped');

  const card = currentCards[currentIndex];
  document.getElementById('card-emoji').textContent = card.e;
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-back-prompt').textContent = currentDeck.reflection;
  document.getElementById('card-number').textContent = `${currentIndex + 1} / ${currentCards.length}`;

  const pct = ((currentIndex + 1) / currentCards.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === currentCards.length - 1;

  wrapper.classList.remove('slide-right', 'slide-left');
  void wrapper.offsetWidth;
  wrapper.classList.add(direction === 'right' ? 'slide-right' : 'slide-left');
}

function flipCard() {
  const inner = document.getElementById('card-inner');
  isFlipped = !isFlipped;
  inner.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentCards.length - 1) {
    currentIndex++;
    renderCard('right');
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard('left');
  }
}

function shuffleCards() {
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  currentIndex = 0;
  renderCard('right');
}

function backToDecks() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('deck-screen').style.display = 'flex';
}

function setupTouchHandlers() {
  const area = document.getElementById('card-area');
  area.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  area.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) nextCard();
      else prevCard();
    }
  }, { passive: true });
}

init();
</script>
</body>
</html>
